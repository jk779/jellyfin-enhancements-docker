services:
  jellyfin:
    image: jellyfin/jellyfin
    expose: ["8096"]
    # ports:
    #   - 8096:8096/tcp
    #   - 7359:7359/udp
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - type: bind
        source: /Volumes/share
        target: /media
        read_only: true
    environment:
      - JELLYFIN_FFmpeg__analyzeduration=16M
      - JELLYFIN_FFmpeg__probesize=32M
    restart: 'unless-stopped'
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  jellyfin-caddy:
    image: ghcr.io/jk779/jellyfin-enhancements-docker:latest
    ports:
      - "8096:8096"
    # only overwrite these if you want to change the config on the fly
    # volumes:
    #   - ./Caddyfile:/etc/caddy/Caddyfile
    #   - ./inject:/srv/inject:ro
    restart: 'unless-stopped'

volumes:
  jellyfin_config:
  jellyfin_cache:
