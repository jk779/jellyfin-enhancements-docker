services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    expose: ["8096"]
    # ports:
    #   - 8096:8096/tcp
    #   - 7359:7359/udp
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - type: bind
        source: /Volumes/share
        target: /media
        read_only: true
    environment:
      - JELLYFIN_FFmpeg__analyzeduration=16M
      - JELLYFIN_FFmpeg__probesize=32M
    restart: 'unless-stopped'
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  jellyfin-caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: jellyfin-caddy
    depends_on:
      - jellyfin
    ports:
      - "8096:8096"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./qualitytags.js:/srv/qualitytags.js:ro
      - ./log-viewer-inject.js:/srv/log-viewer-inject.js:ro
    restart: 'unless-stopped'


volumes:
  jellyfin_config:
  jellyfin_cache:
