events {}

http {
  # Ensure sub_filter runs on HTML; add xhtml if you need it
  sub_filter_types text/html;

  server {
    listen 8096;

    # Serve our JS from the proxy itself (same origin)
    location = /qualitytags.js {
      root  /srv;        # file at /srv/qualitytags.js
      types { }
      default_type application/javascript;
    }

    location / {
      # Disable upstream compression so sub_filter can see plain HTML
      proxy_set_header Accept-Encoding "";

      # Pass through WS and headers Jellyfin expects
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;

      proxy_buffering off;  # helps with streaming

      proxy_pass http://jellyfin:8096;

      # Inject script before </body> (first occurrence is genug)
      sub_filter_once on;
      sub_filter '</body>' '<script defer src="/qualitytags.js"></script></body>';
    }
  }
}
